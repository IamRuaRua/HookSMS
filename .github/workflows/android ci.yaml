name: Android CI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      GITHUB_ACTIONS: true
      USE_ALIYUN_MIRRORS: false
      STORE_FILE_BASE64: ${{ secrets.STORE_FILE }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Retrieve the keystore secret and decode it to a file
        if: env.STORE_FILE_BASE64 != ''
        run: |
          echo $STORE_FILE_BASE64 | base64 --decode > rua.jks

      - name: Generate keystore.properties
        if: env.STORE_FILE_BASE64 != ''
        run: |
          cat > keystore.properties <<EOF
          storeFile=rua.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: gradle assembleRelease

      - name: Verify APK signature
        if: env.STORE_FILE_BASE64 != ''
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -n 1)
          "${BUILD_TOOLS}apksigner" verify --verbose app/build/outputs/apk/release/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: HookSMS-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
